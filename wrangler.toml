name = "test-api-proxy-worker"
main = "src/index.js"
compatibility_date = "2026-07-10"

[vars]
# 改成你当前只开放 HTTP 的阿里云 NLB DNS 地址。
BACKEND_ORIGIN = "http://nlb-example.aliyuncs.com"

# true:  /api/user/list -> https://backend.example.com/user/list
# false: /api/user/list -> https://backend.example.com/api/user/list
STRIP_API_PREFIX = "true"
